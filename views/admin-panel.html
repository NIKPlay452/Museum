<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Панель управления - Музей технологий</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body class="admin-page">
    <div class="background-overlay"></div>
    
    <header class="site-header"></header>
    
    <div class="admin-container">
        <h1 class="admin-title">Панель управления</h1>
        
        <div class="admin-buttons">
            <button class="admin-btn" data-action="create">
                <span class="btn-icon">➕</span> Создать
            </button>
            <button class="admin-btn" data-action="edit">
                <span class="btn-icon">✏️</span> Редактировать
            </button>
            <button class="admin-btn" data-action="status">
                <span class="btn-icon">📊</span> Статусы
            </button>
            <button class="admin-btn admin-only" data-action="editors">
                <span class="btn-icon">👥</span> Редакторы
            </button>
            <button class="admin-btn admin-only" data-action="applications">
                <span class="btn-icon">📨</span> Заявки
            </button>
            <button class="admin-btn" data-action="style-editor">
                <span class="btn-icon">🎨</span> Редактор стилей
            </button>
        </div>
    </div>
    
    <div id="modalContainer"></div>
    
    <script src="/js/main.js"></script>
    <script src="/js/admin.js"></script>
    <script src="/js/style-loader.js"></script>
</body>
</html>
