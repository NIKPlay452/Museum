<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Панель управления - Музей технологий</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body class="admin-page">
    <div class="background-overlay"></div>
    
    <header class="site-header">
        <a href="/views/index.html" class="home-link">🏠 <span>Главная</span></a>
        <div class="header-right">
            <span class="user-badge" id="userRole"></span>
            <a href="/views/login.html" class="btn-login" id="loginBtn">Вход</a>
            <button id="logoutBtn" class="btn-logout" style="display: none;">Выход</button>
        </div>
    </header>
    
    <div class="admin-container">
        <h1 class="admin-title">Панель управления</h1>
        
        <div class="admin-buttons">
            <button class="admin-btn" data-action="create">
                <span class="btn-icon">➕</span> Создать
            </button>
            <button class="admin-btn" data-action="edit">
                <span class="btn-icon">✏️</span> Редактировать
            </button>
            <button class="admin-btn" data-action="status">
                <span class="btn-icon">📊</span> Статусы
            </button>
            <button class="admin-btn admin-only" data-action="editors" style="display: none;">
                <span class="btn-icon">👥</span> Редакторы
            </button>
            <button class="admin-btn admin-only" data-action="applications" style="display: none;">
                <span class="btn-icon">📨</span> Заявки
            </button>
        </div>
    </div>
    
    <div id="modalContainer"></div>
    
    <script src="/js/main.js"></script>
    <script src="/js/admin.js"></script>
</body>
</html>
