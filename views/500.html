<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ошибка сервера - Музей технологий</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="error-page">
    <div class="background-overlay"></div>
    
    <header class="site-header">
        <a href="/views/index.html" class="home-link">🏠 <span>Главная</span></a>
        <a href="/views/login.html" class="btn-login">Вход</a>
    </header>
    
    <div class="error-container">
        <div class="error-content">
            <div class="error-code">500</div>
            <h1 class="error-title">Внутренняя ошибка сервера</h1>
            <p class="error-message">Что-то пошло не так. Пожалуйста, попробуйте позже.</p>
            <a href="/views/index.html" class="error-home-link">Вернуться на главную</a>
        </div>
    </div>
    
    <style>
        .error-page {
            min-height: 100vh;
            background: var(--bg-dark);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .error-container {
            text-align: center;
            padding: 2rem;
        }
        
        .error-code {
            font-family: 'Orbitron', monospace;
            font-size: 6rem;
            color: var(--primary);
            margin-bottom: 1rem;
            text-shadow: 0 0 20px rgba(201, 160, 61, 0.3);
        }
        
        .error-title {
            font-size: 1.5rem;
            color: var(--text);
            margin-bottom: 1rem;
        }
        
        .error-message {
            color: var(--text-muted);
            margin-bottom: 2rem;
        }
        
        .error-home-link {
            display: inline-block;
            padding: 0.8rem 2rem;
            background: transparent;
            border: 1px solid var(--primary);
            border-radius: 40px;
            color: var(--primary);
            text-decoration: none;
            transition: all 0.3s ease;
        }
        
        .error-home-link:hover {
            background: var(--primary);
            color: var(--bg-dark);
            transform: translateY(-2px);
        }
    </style>
</body>
</html>
