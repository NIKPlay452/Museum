<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход - Музей технологий</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500&display=swap" rel="stylesheet">
</head>
<body class="login-page">
    <!-- Фон -->
    <div class="background-overlay" style="background: linear-gradient(135deg, #0a0f1e, #1a1f30);"></div>
    
    <!-- Шапка с навигацией -->
    <header class="site-header">
        <a href="/views/index.html" class="home-link">🏠 Главная</a>
        <a href="/views/login.html" class="btn-login">Вход</a>
    </header>
    
    <div class="login-container">
        <form id="loginForm" class="login-form">
            <h2>🔐 Доступ в редакцию</h2>
            <div class="form-group">
                <input type="text" id="username" placeholder="Логин" required>
            </div>
            <div class="form-group">
                <input type="password" id="password" placeholder="Пароль" required>
            </div>
            <button type="submit">Войти</button>
            <p class="error-message" id="loginError"></p>
        </form>
    </div>
    
    <script src="/js/main.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    NotificationManager.show('Вход выполнен успешно!', 'success');
                    
                    // Обновляем UI на всех страницах
                    window.dispatchEvent(new Event('authChange'));
                    
                    setTimeout(() => {
                        window.location.href = '/views/admin-panel.html';
                    }, 1000);
                } else {
                    document.getElementById('loginError').textContent = data.error || 'Ошибка входа';
                }
            } catch (error) {
                document.getElementById('loginError').textContent = 'Ошибка соединения';
            }
        });
    </script>
</body>
</html>
