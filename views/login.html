<body class="login-page">
    <!-- Фон -->
    <div class="background-overlay" style="background: linear-gradient(135deg, #0a0f1e, #1a1f30);"></div>
    
    <!-- Шапка с навигацией -->
    <header class="site-header">
        <a href="/views/index.html" class="home-link">🏠 Главная</a>
        <a href="/views/login.html" class="btn-login">Вход</a>
    </header>
    
    <div class="login-container">
        <form id="loginForm" class="login-form">
            <h2>🔐 Доступ в редакцию</h2>
            <div class="form-group">
                <input type="text" id="username" placeholder="Логин" required>
            </div>
            <div class="form-group">
                <input type="password" id="password" placeholder="Пароль" required>
            </div>
            <button type="submit">Войти</button>
            <p class="error-message" id="loginError"></p>
        </form>
    </div>
    
    <script src="/js/main.js"></script>

<script>
    console.log('✅ Скрипт входа загружен');
    
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        console.log('📝 Форма отправлена');
        
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        
        console.log('👤 Логин:', username);
        console.log('🔑 Пароль:', password ? '✓ введен' : '✗ пустой');
        
        try {
            console.log('🔄 Отправка запроса к /api/login...');
            
            const response = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            
            console.log('📊 Статус ответа:', response.status);
            console.log('📊 Тип ответа:', response.headers.get('content-type'));
            
            // Проверяем, что ответ в формате JSON
            const contentType = response.headers.get('content-type');
            if (!contentType || !contentType.includes('application/json')) {
                const text = await response.text();
                console.error('❌ Ответ не в формате JSON:', text);
                document.getElementById('loginError').textContent = 'Ошибка сервера: неверный формат ответа';
                return;
            }
            
            const data = await response.json();
            console.log('📦 Данные ответа:', data);
            
            if (response.ok && data.success) {
                console.log('✅ Вход выполнен успешно!');
                
                // Показываем уведомление через NotificationManager
                if (window.NotificationManager) {
                    window.NotificationManager.show('Вход выполнен успешно!', 'success');
                } else {
                    alert('Вход выполнен успешно!');
                }
                
                // Обновляем UI на всех страницах
                window.dispatchEvent(new Event('authChange'));
                
                // Перенаправляем в админ-панель
                console.log('➡️ Перенаправление в админ-панель...');
                setTimeout(() => {
                    window.location.href = '/views/admin-panel.html';
                }, 1000);
            } else {
                console.log('❌ Ошибка входа:', data.error || 'Неизвестная ошибка');
                document.getElementById('loginError').textContent = data.error || 'Ошибка входа';
            }
        } catch (error) {
            console.error('🔥 Критическая ошибка:', error);
            console.error('Стек ошибки:', error.stack);
            document.getElementById('loginError').textContent = 'Ошибка соединения: ' + error.message;
        }
    });
</script>
</body>
