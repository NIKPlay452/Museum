<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Страница не найдена</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .error-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
        }
        .error-code {
            font-size: 120px;
            color: #4ecdc4;
            font-family: 'Orbitron', sans-serif;
            text-shadow: 0 0 20px #4ecdc4;
            margin-bottom: 20px;
        }
        .error-message {
            font-size: 24px;
            color: #fff;
            margin-bottom: 30px;
        }
        .home-link {
            display: inline-block;
            padding: 12px 30px;
            background: linear-gradient(45deg, #4ecdc4, #2a9d8f);
            color: white;
            text-decoration: none;
            border-radius: 30px;
            font-weight: bold;
            transition: 0.3s;
        }
        .home-link:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px #4ecdc4;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-code">404</div>
        <div class="error-message">Страница не найдена</div>
        <a href="/views/index.html" class="home-link">Вернуться на главную</a>
    </div>
</body>
</html>
